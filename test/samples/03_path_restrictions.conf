# Sample 03: path restrictions
# Commands to test:
#   - pwd                       # allowed
#   - ls /tmp                   # allowed
#   - cd /tmp                   # allowed
#   - touch /tmp/ok.txt         # allowed
#   - cat /etc/passwd           # denied (outside allowed path)
#   - cd /var                   # denied (outside allowed path)

[global]
logpath  : /tmp/lshell-logs/
loglevel : 3

[default]
intro           : "Sample 03 path restrictions\nTry:\n- pwd\n- ls /tmp\n- cd /tmp\n- touch /tmp/ok.txt\n- cat /etc/passwd\n- cd /var"
allowed         : ['ls', 'pwd', 'cd', 'cat', 'touch', 'mkdir', 'rm']
forbidden       : [';', '&', '|', '`', '>', '<', '$(', '${']
path            : ['/tmp', '/home/testuser']
warning_counter : 4
strict          : 0
policy_commands : 1
prompt          : "paths:\033[91m%u\033[97m@\033[96m%h\033[0m"
