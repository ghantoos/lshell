# Sample 02: strict mode and warning counter
# Commands to test:
#   - ls                        # allowed
#   - does-not-exist            # denied, warning consumed (strict=1)
#   - echo ok                   # allowed
#   - badcmd                    # denied, warning consumed
#   - echo one; echo two        # denied, warning consumed
#   - id                        # after 3 violations session should terminate

[global]
logpath  : /tmp/lshell-logs/
loglevel : 4

[default]
intro           : "Sample 02 strict mode and warnings\nTry:\n- ls\n- does-not-exist\n- echo ok\n- badcmd\n- echo one; echo two\n- id"
allowed         : ['ls', 'pwd', 'echo', 'whoami']
forbidden       : [';', '&', '|', '`', '>', '<', '$(', '${']
warning_counter : 3
strict          : 1
policy_commands : 1
prompt          : "strict:\033[91m%u\033[97m@\033[96m%h\033[0m"
