# Sample 06: env vars, env files, history, and umask
# Commands to test:
#   - printenv APP_ENV          # expected: dev
#   - printenv APP_REGION       # expected: us-east-1
#   - printenv STATIC_TEAM      # expected: platform
#   - umask                     # expected: 0077
#   - touch /tmp/secret.txt
#   - ls -l /tmp/secret.txt     # expected permissions close to 600

[global]
logpath  : /tmp/lshell-logs/
loglevel : 2

[default]
intro           : "\033[1;95mSample 06: env vars, history, and umask\033[0m\n\n\033[1;92mAllowed examples\033[0m\n\033[90m---------------\033[0m\nprintenv APP_ENV\nprintenv APP_REGION\nprintenv STATIC_TEAM\numask\ntouch /tmp/secret.txt\nls -l /tmp/secret.txt\n\n\033[1;91mForbidden examples\033[0m\n\033[90m------------------\033[0m\necho hi; id\ncat /etc/shadow\n"
allowed        : ['ls', 'pwd', 'echo', 'printenv', 'umask', 'touch', 'mkdir', 'cat']
forbidden      : [';', '&', '|', '`', '>', '<', '$(', '${']
env_vars       : {'STATIC_TEAM': 'platform', 'DEPLOY_COLOR': 'blue'}
env_vars_files : ['/app/test/samples/env/common.env']
history_size   : 50
history_file   : '/tmp/.lshell_history_%u'
umask          : 0077
warning_counter: 3
strict         : 0
policy_commands: 1
prompt         : "env:\033[91m%u\033[97m@\033[96m%h\033[0m"
