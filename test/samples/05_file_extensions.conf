# Sample 05: allowed file extensions
# Commands to test:
#   - touch notes.log           # allowed
#   - touch report.txt          # allowed
#   - touch app.conf            # allowed
#   - touch run.sh              # denied (.sh not allowed)
#   - cat notes.log             # allowed
#   - cat run.sh                # denied (.sh not allowed)

[global]
logpath  : /tmp/lshell-logs/
loglevel : 3

[default]
intro           : "\033[1;95mSample 05: allowed file extensions\033[0m\n\n\033[1;92mAllowed examples\033[0m\n\033[90m---------------\033[0m\ntouch notes.log\ntouch report.txt\ntouch app.conf\ncat notes.log\n\n\033[1;91mForbidden examples\033[0m\n\033[90m------------------\033[0m\ntouch run.sh\ncat run.sh\n"
allowed                 : ['ls', 'pwd', 'cat', 'touch', 'rm', 'mv', 'cp']
allowed_file_extensions : ['.log', '.txt', '.conf']
forbidden               : [';', '&', '|', '`', '>', '<', '$(', '${']
warning_counter         : 3
strict                  : 1
policy_commands         : 1
prompt                  : "ext:\033[91m%u\033[97m@\033[96m%h\033[0m"
