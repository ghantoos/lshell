# Sample 09: include_dir split configuration
# Commands to test:
#   - pwd                       # allowed (from [default] in this file)
#   - id                        # allowed (from include.d/20_group_testuser.conf)
#   - whoami                    # allowed (from include.d/30_user_testuser.conf)
#   - echo hello                # denied (user include removes it)
#   - ll                        # allowed (alias from include file)
#   - lshow               # shows included files and merged policy

[global]
logpath     : /tmp/lshell-logs/
loglevel    : 3
include_dir : /app/test/samples/include.d/*.conf

[default]
intro           : "\033[1;95mSample 09: include_dir configuration merge\033[0m\n\n\033[1;92mAllowed examples\033[0m\n\033[90m---------------\033[0m\npwd\nid\nwhoami\nll\nlshow\n\n\033[1;91mForbidden examples\033[0m\n\033[90m------------------\033[0m\necho hello\n"
allowed         : ['ls', 'pwd', 'echo']
forbidden       : [';', '&', '|', '`', '>', '<', '$(', '${']
warning_counter : 3
strict          : 0
policy_commands : 1
prompt          : "include:\033[91m%u\033[97m@\033[96m%h\033[0m"
