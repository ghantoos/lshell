# Sample 02: strict mode and warning counter
# Commands to test:
#   - ls                        # allowed
#   - does-not-exist            # denied, warning consumed (strict=1)
#   - echo ok                   # allowed
#   - badcmd                    # denied, warning consumed
#   - echo one; echo two        # denied, warning consumed
#   - id                        # after 3 violations session should terminate

[global]
logpath  : /tmp/lshell-logs/
loglevel : 4

[default]
intro           : "\033[1;95mSample 02: strict mode and warning counter\033[0m\n\n\033[1;92mAllowed examples\033[0m\n\033[90m---------------\033[0m\nls\necho ok\n\n\033[1;91mForbidden examples\033[0m\n\033[90m------------------\033[0m\ndoes-not-exist\nbadcmd\necho one; echo two\n"
allowed         : ['ls', 'pwd', 'echo', 'whoami']
forbidden       : [';', '&', '|', '`', '>', '<', '$(', '${']
warning_counter : 3
strict          : 1
policy_commands : 1
prompt          : "strict:\033[91m%u\033[97m@\033[96m%h\033[0m"
