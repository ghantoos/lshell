# Sample 01: baseline allow-list shell
# Commands to test:
#   - pwd                       # allowed
#   - ll                        # alias to ls -la (allowed)
#   - echo hello                # allowed
#   - uname -a                  # denied (not in allowed list)
#   - echo hi; id               # denied (forbidden character ';')
#   - policy-show               # shows effective policy

[global]
logpath  : /tmp/lshell-logs/
loglevel : 2

[default]
intro           : "\033[1;95mSample 01: baseline allow-list\033[0m\n\n\033[1;92mAllowed examples\033[0m\n\033[90m---------------\033[0m\npwd\nll\necho hello\npolicy-show\n\n\033[1;91mForbidden examples\033[0m\n\033[90m------------------\033[0m\nuname -a\necho hi; id\n"
allowed         : ['ls', 'pwd', 'echo', 'cat', 'whoami', 'id', 'date', 'clear']
forbidden       : [';', '&', '|', '`', '>', '<', '$(', '${']
warning_counter : 3
aliases         : {'ll': 'ls -la'}
strict          : 0
policy_commands : 1
prompt          : "baseline:\033[91m%u\033[97m@\033[96m%h\033[0m"
