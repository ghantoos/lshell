# Sample 04: sudo controls, aliases, and shell-escape allowance
# Commands to test:
#   - ll                        # alias to ls -l (allowed)
#   - sudo ls /tmp              # allowed (sudo + ls permitted)
#   - sudo id                   # allowed
#   - sudo cat /etc/passwd      # denied (sudo target command not allowed)
#   - sudo bash                 # denied (sudo target command not allowed)
#   - lshow         # inspect merged policy (includes sudo section)

[global]
logpath  : /tmp/lshell-logs/
loglevel : 3

[default]
intro           : "\033[1;95mSample 04: sudo controls and aliases\033[0m\n\n\033[1;92mAllowed examples\033[0m\n\033[90m---------------\033[0m\nll\nsudo ls /tmp\nsudo id\nlshow\n\n\033[1;91mForbidden examples\033[0m\n\033[90m------------------\033[0m\nsudo cat /etc/passwd\nsudo bash\n"
allowed              : ['ls', 'pwd', 'echo', 'id', 'sudo']
allowed_shell_escape : ['sudo']
sudo_commands        : ['ls', 'id']
forbidden            : [';', '&', '|', '`', '>', '<', '$(', '${']
warning_counter      : 3
aliases              : {'ll': 'ls -l', 'la': 'ls -la'}
strict               : 1
policy_commands      : 1
prompt               : "sudo:\033[91m%u\033[97m@\033[96m%h\033[0m"
