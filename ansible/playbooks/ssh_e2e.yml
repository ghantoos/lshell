---
- name: Configure SSH target with lshell
  hosts: lshell_target
  gather_facts: false
  become: true
  vars:
    lshell_bin: /usr/local/bin/lshell
    test_user: ltest
    test_user_sftp_off: ltestsftpoff
    test_user_scp_down_off: ltestscpdownoff
    test_user_scp_up_on: ltestscpup
    test_user_scp_off: ltestscpoff
    test_user_winscp: ltestwinscp
    test_user_pipe_on: ltestpipeon
    test_user_alias: ltestalias
    test_user_scp_over: ltestscpover
    test_user_scp_force: ltestscpforce
    test_home: /home/ltest
    test_user_password: ltestpass
    test_user_sftp_off_password: ltestsftpoffpass
    test_user_scp_down_off_password: ltestscpdownoffpass
    test_user_scp_up_on_password: ltestscpuppass
    test_user_scp_off_password: ltestscpoffpass
    test_user_winscp_password: ltestwinscppass
    test_user_pipe_on_password: ltestpipeonpass
    test_user_alias_password: ltestaliaspass
    test_user_scp_over_password: ltestscpoverpass
    test_user_scp_force_password: ltestscpforcepass
  tasks:
    - name: Wait for SSH access
      ansible.builtin.wait_for_connection:
        timeout: 120

    - name: Install lshell from workspace
      ansible.builtin.pip:
        name: /workspace
        executable: pip3
        extra_args: --break-system-packages

    - name: Ensure lshell binary exists
      ansible.builtin.stat:
        path: "{{ lshell_bin }}"
      register: lshell_bin_stat

    - name: Assert lshell binary is available
      ansible.builtin.assert:
        that:
          - lshell_bin_stat.stat.exists
        fail_msg: "lshell binary not found at {{ lshell_bin }}"

    - name: Register lshell as a valid shell
      ansible.builtin.lineinfile:
        path: /etc/shells
        line: "{{ lshell_bin }}"
        state: present

    - name: Create restricted SSH test user
      ansible.builtin.user:
        name: "{{ test_user }}"
        shell: "{{ lshell_bin }}"
        create_home: true

    - name: Set password for restricted SSH test user
      ansible.builtin.shell: |
        echo "{{ test_user }}:{{ test_user_password }}" | chpasswd
      args:
        executable: /bin/bash
      changed_when: false

    - name: Create SSH test user with sftp disabled in profile
      ansible.builtin.user:
        name: "{{ test_user_sftp_off }}"
        shell: "{{ lshell_bin }}"
        create_home: true

    - name: Set password for sftp-disabled SSH test user
      ansible.builtin.shell: |
        echo "{{ test_user_sftp_off }}:{{ test_user_sftp_off_password }}" | chpasswd
      args:
        executable: /bin/bash
      changed_when: false

    - name: Create SSH test user with scp_download disabled in profile
      ansible.builtin.user:
        name: "{{ test_user_scp_down_off }}"
        shell: "{{ lshell_bin }}"
        create_home: true

    - name: Set password for scp_download-disabled SSH test user
      ansible.builtin.shell: |
        echo "{{ test_user_scp_down_off }}:{{ test_user_scp_down_off_password }}" | chpasswd
      args:
        executable: /bin/bash
      changed_when: false

    - name: Create SSH test user with scp_upload enabled in profile
      ansible.builtin.user:
        name: "{{ test_user_scp_up_on }}"
        shell: "{{ lshell_bin }}"
        create_home: true

    - name: Set password for scp_upload-enabled SSH test user
      ansible.builtin.shell: |
        echo "{{ test_user_scp_up_on }}:{{ test_user_scp_up_on_password }}" | chpasswd
      args:
        executable: /bin/bash
      changed_when: false

    - name: Create SSH test user with scp fully disabled in profile
      ansible.builtin.user:
        name: "{{ test_user_scp_off }}"
        shell: "{{ lshell_bin }}"
        create_home: true

    - name: Set password for scp-disabled SSH test user
      ansible.builtin.shell: |
        echo "{{ test_user_scp_off }}:{{ test_user_scp_off_password }}" | chpasswd
      args:
        executable: /bin/bash
      changed_when: false

    - name: Create SSH test user with WinSCP mode in profile
      ansible.builtin.user:
        name: "{{ test_user_winscp }}"
        shell: "{{ lshell_bin }}"
        create_home: true

    - name: Set password for WinSCP-mode SSH test user
      ansible.builtin.shell: |
        echo "{{ test_user_winscp }}:{{ test_user_winscp_password }}" | chpasswd
      args:
        executable: /bin/bash
      changed_when: false

    - name: Create SSH test user with pipe character allowed in profile
      ansible.builtin.user:
        name: "{{ test_user_pipe_on }}"
        shell: "{{ lshell_bin }}"
        create_home: true

    - name: Set password for pipe-allowed SSH test user
      ansible.builtin.shell: |
        echo "{{ test_user_pipe_on }}:{{ test_user_pipe_on_password }}" | chpasswd
      args:
        executable: /bin/bash
      changed_when: false

    - name: Create SSH test user with alias-enabled profile
      ansible.builtin.user:
        name: "{{ test_user_alias }}"
        shell: "{{ lshell_bin }}"
        create_home: true

    - name: Set password for alias-enabled SSH test user
      ansible.builtin.shell: |
        echo "{{ test_user_alias }}:{{ test_user_alias_password }}" | chpasswd
      args:
        executable: /bin/bash
      changed_when: false

    - name: Create SSH test user with scp fallback through overssh
      ansible.builtin.user:
        name: "{{ test_user_scp_over }}"
        shell: "{{ lshell_bin }}"
        create_home: true

    - name: Set password for scp-fallback SSH test user
      ansible.builtin.shell: |
        echo "{{ test_user_scp_over }}:{{ test_user_scp_over_password }}" | chpasswd
      args:
        executable: /bin/bash
      changed_when: false

    - name: Create SSH test user with scpforce upload profile
      ansible.builtin.user:
        name: "{{ test_user_scp_force }}"
        shell: "{{ lshell_bin }}"
        create_home: true

    - name: Set password for scpforce SSH test user
      ansible.builtin.shell: |
        echo "{{ test_user_scp_force }}:{{ test_user_scp_force_password }}" | chpasswd
      args:
        executable: /bin/bash
      changed_when: false

    - name: Allow passwordless sudo for /usr/bin/ls in test user
      ansible.builtin.copy:
        dest: /etc/sudoers.d/ltest-lshell-e2e
        content: "{{ test_user }} ALL=(ALL) NOPASSWD: /usr/bin/ls\n"
        mode: "0440"

    - name: Deploy lshell test configuration
      ansible.builtin.template:
        src: ../templates/lshell.conf.j2
        dest: /etc/lshell.conf
        mode: "0644"

    - name: Create remote files used by extension checks
      ansible.builtin.copy:
        dest: "{{ item.dest }}"
        content: "{{ item.content }}"
        owner: "{{ test_user }}"
        group: "{{ test_user }}"
        mode: "0644"
      loop:
        - { dest: "{{ test_home }}/readme.txt", content: "hello from txt\n" }
        - { dest: "{{ test_home }}/secret.bin", content: "binary-looking content\n" }
        - { dest: "{{ test_home }}/noext", content: "no extension file\n" }

    - name: Create per-user readme files for protocol tests
      ansible.builtin.copy:
        dest: "/home/{{ item.user }}/readme.txt"
        content: "hello from {{ item.user }}\n"
        owner: "{{ item.user }}"
        group: "{{ item.user }}"
        mode: "0644"
      loop:
        - { user: "{{ test_user_scp_down_off }}" }
        - { user: "{{ test_user_scp_up_on }}" }
        - { user: "{{ test_user_scp_off }}" }
        - { user: "{{ test_user_winscp }}" }
        - { user: "{{ test_user_alias }}" }
        - { user: "{{ test_user_scp_over }}" }
        - { user: "{{ test_user_scp_force }}" }

    - name: Create extra .bin file for scp extension policy checks
      ansible.builtin.copy:
        dest: "/home/{{ test_user_scp_up_on }}/secret.bin"
        content: "binary extension for scp policy checks\n"
        owner: "{{ test_user_scp_up_on }}"
        group: "{{ test_user_scp_up_on }}"
        mode: "0644"

    - name: Ensure scpforce target directory exists
      ansible.builtin.file:
        path: "/home/{{ test_user_scp_force }}/forced"
        state: directory
        owner: "{{ test_user_scp_force }}"
        group: "{{ test_user_scp_force }}"
        mode: "0755"

    - name: Create allowed executable for ./ execution checks
      ansible.builtin.copy:
        dest: "{{ test_home }}/shutdown.sh"
        content: |
          #!/bin/sh
          echo "shutdown-script-ok"
        owner: "{{ test_user }}"
        group: "{{ test_user }}"
        mode: "0755"

- name: Run real SSH command scenarios
  hosts: localhost
  connection: local
  gather_facts: false
  vars_files:
    - ../vars/ssh_scenarios.yml
  vars:
    ssh_user: ltest
    ssh_user_sftp_off: ltestsftpoff
    ssh_user_scp_down_off: ltestscpdownoff
    ssh_user_scp_up_on: ltestscpup
    ssh_user_scp_off: ltestscpoff
    ssh_user_winscp: ltestwinscp
    ssh_user_pipe_on: ltestpipeon
    ssh_user_alias: ltestalias
    ssh_user_scp_over: ltestscpover
    ssh_user_scp_force: ltestscpforce
    ssh_host: lshell-ssh-target
    ssh_password: ltestpass
    ssh_password_sftp_off: ltestsftpoffpass
    ssh_password_scp_down_off: ltestscpdownoffpass
    ssh_password_scp_up_on: ltestscpuppass
    ssh_password_scp_off: ltestscpoffpass
    ssh_password_winscp: ltestwinscppass
    ssh_password_pipe_on: ltestpipeonpass
    ssh_password_alias: ltestaliaspass
    ssh_password_scp_over: ltestscpoverpass
    ssh_password_scp_force: ltestscpforcepass
    ssh_common_opts: >-
      -o StrictHostKeyChecking=no
      -o UserKnownHostsFile=/dev/null
      -o LogLevel=ERROR
  tasks:
    - name: Execute SSH scenarios
      ansible.builtin.shell: >-
        sshpass -p {{ item.password | default(ssh_password) }} ssh {{ ssh_common_opts }}
        {{ item.user | default(ssh_user) }}@{{ ssh_host }} {{ item.command | quote }} 2>&1
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false
      register: ssh_scenario_results
      loop: "{{ ssh_scenarios }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Build compact SSH scenario report
      ansible.builtin.set_fact:
        ssh_scenario_report: >-
          {{
            (ssh_scenario_report | default([]))
            + [
              {
                "name": item.item.name,
                "expected_rc": item.item.expected_rc,
                "actual_rc": item.rc,
                "expect_text": item.item.expect_text | default(""),
                "reject_text": item.item.reject_text | default(""),
                "output": item.stdout | default("") | trim,
                "passed": (
                  (item.rc == item.item.expected_rc)
                  and
                  (
                    item.item.expect_text is not defined
                    or (item.stdout | string).find(item.item.expect_text) != -1
                  )
                  and
                  (
                    item.item.reject_text is not defined
                    or (item.stdout | string).find(item.item.reject_text) == -1
                  )
                )
              }
            ]
          }}
      loop: "{{ ssh_scenario_results.results }}"
      loop_control:
        label: "{{ item.item.name }}"

    - name: Print compact SSH scenario summary
      ansible.builtin.debug:
        msg: >-
          {{ item.name }} | rc={{ item.actual_rc }}/{{ item.expected_rc }} |
          {{ "PASS" if item.passed else "FAIL" }}
      loop: "{{ ssh_scenario_report }}"
      loop_control:
        label: "{{ item.name }}"

    - name: Collect failed SSH scenarios
      ansible.builtin.set_fact:
        failed_scenarios: "{{ ssh_scenario_report | rejectattr('passed', 'equalto', true) | list }}"

    - name: Fail once with compact summary if any SSH scenario failed
      ansible.builtin.fail:
        msg: |
          SSH scenario failures ({{ failed_scenarios | length }}):
          {% for scenario in failed_scenarios %}
          - {{ scenario.name }} | rc={{ scenario.actual_rc }}/{{ scenario.expected_rc }}
            expected_text={{ scenario.expect_text if scenario.expect_text else "<none>" }}
            reject_text={{ scenario.reject_text if scenario.reject_text else "<none>" }}
            output={{ scenario.output | replace('\n', '\\n') }}
          {% endfor %}
      when: failed_scenarios | length > 0

    - name: Create local file for scp upload attempt
      ansible.builtin.copy:
        dest: /tmp/lshell_scp_upload.txt
        content: "scp upload probe\n"
        mode: "0644"

    - name: Create local .bin file for scp extension-deny upload checks
      ansible.builtin.copy:
        dest: /tmp/lshell_scp_upload.bin
        content: "scp upload binary probe\n"
        mode: "0644"

    - name: Create local file for scpforce upload checks
      ansible.builtin.copy:
        dest: /tmp/lshell_scp_force.txt
        content: "scpforce upload probe\n"
        mode: "0644"

    - name: Attempt scp upload when scp_upload is disabled
      ansible.builtin.shell: >-
        sshpass -p {{ ssh_password }} scp -O {{ ssh_common_opts }}
        /tmp/lshell_scp_upload.txt
        {{ ssh_user }}@{{ ssh_host }}:/home/{{ ssh_user }}/upload_should_fail.txt 2>&1
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false
      register: scp_upload_attempt

    - name: Assert scp upload is blocked when scp_upload is disabled
      ansible.builtin.assert:
        that:
          - scp_upload_attempt.rc != 0
        fail_msg: >-
          scp upload unexpectedly succeeded. output={{ scp_upload_attempt.stdout }}

    - name: Verify blocked scp upload did not create target file
      ansible.builtin.stat:
        path: /home/{{ ssh_user }}/upload_should_fail.txt
      delegate_to: "{{ ssh_host }}"
      register: blocked_upload_target

    - name: Assert blocked scp upload target file is absent
      ansible.builtin.assert:
        that:
          - not blocked_upload_target.stat.exists
        fail_msg: "scp upload target file exists despite scp_upload=0"

    - name: Download file over scp when scp_download is enabled
      ansible.builtin.shell: >-
        sshpass -p {{ ssh_password }} scp -O {{ ssh_common_opts }}
        {{ ssh_user }}@{{ ssh_host }}:/home/{{ ssh_user }}/readme.txt
        /tmp/lshell_scp_download.txt 2>&1
      args:
        executable: /bin/bash
      changed_when: false
      register: scp_download_attempt

    - name: Assert scp download succeeded when scp_download is enabled
      ansible.builtin.assert:
        that:
          - scp_download_attempt.rc == 0
        fail_msg: >-
          scp download failed unexpectedly. output={{ scp_download_attempt.stdout }}

    - name: Read downloaded scp file
      ansible.builtin.slurp:
        src: /tmp/lshell_scp_download.txt
      register: scp_downloaded_file

    - name: Assert downloaded scp file content
      ansible.builtin.assert:
        that:
          - "'hello from txt' in (scp_downloaded_file.content | b64decode)"
        fail_msg: "Downloaded scp file content mismatch"

    - name: Upload file over scp when scp_upload is enabled
      ansible.builtin.shell: >-
        sshpass -p {{ ssh_password_scp_up_on }} scp -O {{ ssh_common_opts }}
        /tmp/lshell_scp_upload.txt
        {{ ssh_user_scp_up_on }}@{{ ssh_host }}:/home/{{ ssh_user_scp_up_on }}/upload_ok.txt 2>&1
      args:
        executable: /bin/bash
      changed_when: false
      register: scp_upload_enabled_attempt

    - name: Assert scp upload succeeded when scp_upload is enabled
      ansible.builtin.assert:
        that:
          - scp_upload_enabled_attempt.rc == 0
        fail_msg: >-
          scp upload failed unexpectedly with scp_upload=1.
          output={{ scp_upload_enabled_attempt.stdout }}

    - name: Verify successful scp upload target file exists
      ansible.builtin.stat:
        path: /home/{{ ssh_user_scp_up_on }}/upload_ok.txt
      delegate_to: "{{ ssh_host }}"
      register: scp_upload_enabled_target

    - name: Assert successful scp upload target file exists
      ansible.builtin.assert:
        that:
          - scp_upload_enabled_target.stat.exists
        fail_msg: "scp upload target file missing despite scp_upload=1"

    - name: Attempt scp download when scp_download is disabled
      ansible.builtin.shell: >-
        sshpass -p {{ ssh_password_scp_down_off }} scp -O {{ ssh_common_opts }}
        {{ ssh_user_scp_down_off }}@{{ ssh_host }}:/home/{{ ssh_user_scp_down_off }}/readme.txt
        /tmp/lshell_scp_download_should_fail.txt 2>&1
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false
      register: scp_download_blocked_attempt

    - name: Assert scp download is blocked when scp_download is disabled
      ansible.builtin.assert:
        that:
          - scp_download_blocked_attempt.rc != 0
        fail_msg: >-
          scp download unexpectedly succeeded with scp_download=0.
          output={{ scp_download_blocked_attempt.stdout }}

    - name: Attempt scp transfer when scp is fully disabled
      ansible.builtin.shell: >-
        sshpass -p {{ ssh_password_scp_off }} scp -O {{ ssh_common_opts }}
        /tmp/lshell_scp_upload.txt
        {{ ssh_user_scp_off }}@{{ ssh_host }}:/home/{{ ssh_user_scp_off }}/scp_should_fail.txt 2>&1
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false
      register: scp_fully_disabled_attempt

    - name: Assert scp is blocked when scp is disabled and not in overssh
      ansible.builtin.assert:
        that:
          - scp_fully_disabled_attempt.rc != 0
        fail_msg: >-
          scp unexpectedly succeeded with scp=0 and no overssh fallback.
          output={{ scp_fully_disabled_attempt.stdout }}

    - name: Attempt scp download when scp is disabled but still present in overssh
      ansible.builtin.shell: >-
        sshpass -p {{ ssh_password_scp_over }} scp -O {{ ssh_common_opts }}
        {{ ssh_user_scp_over }}@{{ ssh_host }}:/home/{{ ssh_user_scp_over }}/readme.txt
        /tmp/lshell_scp_overssh_fallback.txt 2>&1
      args:
        executable: /bin/bash
      changed_when: false
      register: scp_overssh_fallback_attempt

    - name: Assert scp works when scp is disabled but overssh allows scp
      ansible.builtin.assert:
        that:
          - scp_overssh_fallback_attempt.rc == 0
        fail_msg: >-
          scp fallback via overssh failed unexpectedly.
          output={{ scp_overssh_fallback_attempt.stdout }}

    - name: Attempt scp download of forbidden extension over ssh
      ansible.builtin.shell: >-
        sshpass -p {{ ssh_password }} scp -O {{ ssh_common_opts }}
        {{ ssh_user }}@{{ ssh_host }}:/home/{{ ssh_user }}/secret.bin
        /tmp/lshell_scp_download_secret_bin_should_fail.txt 2>&1
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false
      register: scp_download_forbidden_extension_attempt

    - name: Assert scp download is blocked for forbidden extension
      ansible.builtin.assert:
        that:
          - scp_download_forbidden_extension_attempt.rc != 0
        fail_msg: >-
          scp download of forbidden extension unexpectedly succeeded.
          output={{ scp_download_forbidden_extension_attempt.stdout }}

    - name: Attempt scp upload of forbidden extension over ssh
      ansible.builtin.shell: >-
        sshpass -p {{ ssh_password_scp_up_on }} scp -O {{ ssh_common_opts }}
        /tmp/lshell_scp_upload.bin
        {{ ssh_user_scp_up_on }}@{{ ssh_host }}:/home/{{ ssh_user_scp_up_on }}/upload_bin_should_fail.bin 2>&1
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false
      register: scp_upload_forbidden_extension_attempt

    - name: Assert scp upload is blocked for forbidden extension
      ansible.builtin.assert:
        that:
          - scp_upload_forbidden_extension_attempt.rc != 0
        fail_msg: >-
          scp upload of forbidden extension unexpectedly succeeded.
          output={{ scp_upload_forbidden_extension_attempt.stdout }}

    - name: Verify forbidden-extension scp upload target file was not created
      ansible.builtin.stat:
        path: /home/{{ ssh_user_scp_up_on }}/upload_bin_should_fail.bin
      delegate_to: "{{ ssh_host }}"
      register: scp_upload_forbidden_extension_target

    - name: Assert forbidden-extension scp upload target file is absent
      ansible.builtin.assert:
        that:
          - not scp_upload_forbidden_extension_target.stat.exists
        fail_msg: "forbidden-extension scp upload target file exists unexpectedly"

    - name: Attempt scp upload to forbidden target path outside allowed path
      ansible.builtin.shell: >-
        sshpass -p {{ ssh_password_scp_up_on }} scp -O {{ ssh_common_opts }}
        /tmp/lshell_scp_upload.txt
        {{ ssh_user_scp_up_on }}@{{ ssh_host }}:/tmp/lshell_upload_forbidden.txt 2>&1
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false
      register: scp_upload_forbidden_path_attempt

    - name: Assert scp upload is blocked for forbidden target path
      ansible.builtin.assert:
        that:
          - scp_upload_forbidden_path_attempt.rc != 0
        fail_msg: >-
          scp upload to forbidden path unexpectedly succeeded.
          output={{ scp_upload_forbidden_path_attempt.stdout }}

    - name: Verify forbidden upload target file was not created
      ansible.builtin.stat:
        path: /tmp/lshell_upload_forbidden.txt
      delegate_to: "{{ ssh_host }}"
      register: forbidden_upload_target

    - name: Assert forbidden upload target file is absent
      ansible.builtin.assert:
        that:
          - not forbidden_upload_target.stat.exists
        fail_msg: "forbidden scp upload target file exists in /tmp"

    - name: Attempt scp download from forbidden source path outside allowed path
      ansible.builtin.shell: >-
        sshpass -p {{ ssh_password_scp_up_on }} scp -O {{ ssh_common_opts }}
        {{ ssh_user_scp_up_on }}@{{ ssh_host }}:/etc/passwd
        /tmp/lshell_scp_download_forbidden.txt 2>&1
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false
      register: scp_download_forbidden_path_attempt

    - name: Assert scp download is blocked for forbidden source path
      ansible.builtin.assert:
        that:
          - scp_download_forbidden_path_attempt.rc != 0
        fail_msg: >-
          scp download from forbidden path unexpectedly succeeded.
          output={{ scp_download_forbidden_path_attempt.stdout }}

    - name: Verify forbidden scp download did not create local file
      ansible.builtin.stat:
        path: /tmp/lshell_scp_download_forbidden.txt
      register: forbidden_download_file

    - name: Assert forbidden scp download local file is absent
      ansible.builtin.assert:
        that:
          - not forbidden_download_file.stat.exists
        fail_msg: "forbidden scp download created local output file unexpectedly"

    - name: Attempt scp upload with scpforce profile (target should be rewritten)
      ansible.builtin.shell: >-
        sshpass -p {{ ssh_password_scp_force }} scp -O {{ ssh_common_opts }}
        /tmp/lshell_scp_force.txt
        {{ ssh_user_scp_force }}@{{ ssh_host }}:/home/{{ ssh_user_scp_force }}/ignored_target.txt 2>&1
      args:
        executable: /bin/bash
      changed_when: false
      register: scpforce_upload_attempt

    - name: Assert scpforce upload succeeded
      ansible.builtin.assert:
        that:
          - scpforce_upload_attempt.rc == 0
        fail_msg: >-
          scpforce upload failed unexpectedly.
          output={{ scpforce_upload_attempt.stdout }}

    - name: Verify original scpforce destination path is not used
      ansible.builtin.stat:
        path: /home/{{ ssh_user_scp_force }}/ignored_target.txt
      delegate_to: "{{ ssh_host }}"
      register: scpforce_original_target

    - name: Assert original scpforce destination path is absent
      ansible.builtin.assert:
        that:
          - not scpforce_original_target.stat.exists
        fail_msg: "scpforce did not rewrite destination path as expected"

    - name: Verify rewritten scpforce destination file exists in forced directory
      ansible.builtin.stat:
        path: /home/{{ ssh_user_scp_force }}/forced/lshell_scp_force.txt
      delegate_to: "{{ ssh_host }}"
      register: scpforce_forced_target

    - name: Assert rewritten scpforce destination file exists
      ansible.builtin.assert:
        that:
          - scpforce_forced_target.stat.exists
        fail_msg: "scpforce target file missing from forced directory"

    - name: Attempt scp upload in WinSCP mode (should be forced enabled)
      ansible.builtin.shell: >-
        sshpass -p {{ ssh_password_winscp }} scp -O {{ ssh_common_opts }}
        /tmp/lshell_scp_upload.txt
        {{ ssh_user_winscp }}@{{ ssh_host }}:/home/{{ ssh_user_winscp }}/winscp_upload_ok.txt 2>&1
      args:
        executable: /bin/bash
      changed_when: false
      register: winscp_upload_attempt

    - name: Assert WinSCP mode enables scp upload
      ansible.builtin.assert:
        that:
          - winscp_upload_attempt.rc == 0
        fail_msg: >-
          WinSCP-mode scp upload failed unexpectedly.
          output={{ winscp_upload_attempt.stdout }}

    - name: Verify WinSCP upload target file exists
      ansible.builtin.stat:
        path: /home/{{ ssh_user_winscp }}/winscp_upload_ok.txt
      delegate_to: "{{ ssh_host }}"
      register: winscp_uploaded_file

    - name: Assert WinSCP upload created target file
      ansible.builtin.assert:
        that:
          - winscp_uploaded_file.stat.exists
        fail_msg: "WinSCP-mode upload target file is missing"

    - name: Run sftp session when sftp is enabled
      ansible.builtin.shell: >-
        printf 'ls\nbye\n' | sshpass -p {{ ssh_password }} sftp {{ ssh_common_opts }}
        {{ ssh_user }}@{{ ssh_host }} 2>&1
      args:
        executable: /bin/bash
      changed_when: false
      register: sftp_enabled_session

    - name: Assert sftp works when sftp is enabled
      ansible.builtin.assert:
        that:
          - sftp_enabled_session.rc == 0
          - (sftp_enabled_session.stdout | string).find("readme.txt") != -1
        fail_msg: >-
          sftp session failed unexpectedly. output={{ sftp_enabled_session.stdout }}

    - name: Run sftp session when sftp is disabled for user profile
      ansible.builtin.shell: >-
        printf 'ls\nbye\n' | sshpass -p {{ ssh_password_sftp_off }} sftp {{ ssh_common_opts }}
        {{ ssh_user_sftp_off }}@{{ ssh_host }} 2>&1
      args:
        executable: /bin/bash
      changed_when: false
      failed_when: false
      register: sftp_disabled_session

    - name: Assert sftp is blocked when sftp is disabled
      ansible.builtin.assert:
        that:
          - sftp_disabled_session.rc != 0
        fail_msg: >-
          sftp unexpectedly succeeded for sftp-disabled user.
