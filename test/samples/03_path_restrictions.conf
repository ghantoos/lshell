# Sample 03: path restrictions
# Commands to test:
#   - pwd                       # allowed
#   - ls /tmp                   # allowed
#   - cd /tmp                   # allowed
#   - touch /tmp/ok.txt         # allowed
#   - cat /etc/passwd           # denied (outside allowed path)
#   - cd /var                   # denied (outside allowed path)

[global]
logpath  : /tmp/lshell-logs/
loglevel : 3

[default]
intro           : "\033[1;95mSample 03: path restrictions\033[0m\n\n\033[1;92mAllowed examples\033[0m\n\033[90m---------------\033[0m\npwd\nls /tmp\ncd /tmp\ntouch /tmp/ok.txt\n\n\033[1;91mForbidden examples\033[0m\n\033[90m------------------\033[0m\ncat /etc/passwd\ncd /var\n"
allowed         : ['ls', 'pwd', 'cd', 'cat', 'touch', 'mkdir', 'rm']
forbidden       : [';', '&', '|', '`', '>', '<', '$(', '${']
path            : ['/tmp', '/home/testuser']
warning_counter : 4
strict          : 0
policy_commands : 1
prompt          : "paths:\033[91m%u\033[97m@\033[96m%h\033[0m"
