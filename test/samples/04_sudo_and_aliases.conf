# Sample 04: sudo controls, aliases, and shell-escape allowance
# Commands to test:
#   - ll                        # alias to ls -l (allowed)
#   - sudo ls /tmp              # allowed (sudo + ls permitted)
#   - sudo id                   # allowed
#   - sudo cat /etc/passwd      # denied (sudo target command not allowed)
#   - sudo bash                 # denied (sudo target command not allowed)
#   - policy-sudo               # inspect allowed sudo commands

[global]
logpath  : /tmp/lshell-logs/
loglevel : 3

[default]
intro           : "Sample 04 sudo and aliases\nTry:\n- ll\n- sudo ls /tmp\n- sudo id\n- sudo cat /etc/passwd\n- sudo bash\n- policy-sudo"
allowed              : ['ls', 'pwd', 'echo', 'id', 'sudo']
allowed_shell_escape : ['sudo']
sudo_commands        : ['ls', 'id']
forbidden            : [';', '&', '|', '`', '>', '<', '$(', '${']
warning_counter      : 3
aliases              : {'ll': 'ls -l', 'la': 'ls -la'}
strict               : 1
policy_commands      : 1
prompt               : "sudo:\033[91m%u\033[97m@\033[96m%h\033[0m"
