# Sample 08: user/group/default precedence
# Commands to test (run as testuser in container):
#   - id                        # allowed (from [grp:testuser])
#   - whoami                    # allowed (from [testuser])
#   - echo hello                # denied (removed by [testuser])
#   - ll                        # allowed (user alias)
#   - gll                       # allowed (group alias)
#   - lshow               # verify resolved values from all sections

[global]
logpath  : /tmp/lshell-logs/
loglevel : 3

[default]
intro           : "\033[1;95mSample 08: user/group/default precedence\033[0m\n\n\033[1;92mAllowed examples\033[0m\n\033[90m---------------\033[0m\nid\nwhoami\nll\ngll\nlshow\n\n\033[1;91mForbidden examples\033[0m\n\033[90m------------------\033[0m\necho hello\n"
allowed         : ['ls', 'pwd', 'echo']
forbidden       : [';', '&', '|', '`', '>', '<', '$(', '${']
warning_counter : 2
strict          : 0
aliases         : {'ll': 'ls -la'}
policy_commands : 1
prompt          : "default:\033[91m%u\033[97m@\033[96m%h\033[0m"

[grp:testuser]
allowed         : + ['id']
warning_counter : 5
aliases         : + {'gll': 'ls -lah'}
prompt          : "group:\033[91m%u\033[97m@\033[96m%h\033[0m"

[testuser]
allowed         : + ['whoami'] - ['echo']
strict          : 1
aliases         : + {'ll': 'ls -l'}
prompt          : "user:\033[91m%u\033[97m@\033[96m%h\033[0m"
