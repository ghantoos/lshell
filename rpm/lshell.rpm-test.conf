[global]
logpath         : /var/log/lshell/
loglevel        : 2

[default]
allowed                 : ['ls', 'pwd', 'echo', 'cat', 'grep', 'id']
forbidden               : [';', '&', '|', '`', '>', '<', '$(', '${']
warning_counter         : 2
strict                  : 1
path                    : ['/home', '/tmp']
overssh                 : ['rsync', 'scp']
allowed_file_extensions : ['.conf', '.log', '.txt']
aliases                 : {'ll': 'ls -l', 'la': 'ls -la'}
env_vars                : {'LSHELL_LAYER': 'default', 'LSHELL_ENV': 'rpm-test'}
prompt_short            : 1
intro                   : "\033[1;95mRPM Test Profile: layered default/group/user policy\033[0m\n\n\033[1;92mAllowed examples\033[0m\n\033[90m---------------\033[0m\nid\nwhoami\ndate\nll\ncat /home/testuser/lshell/test/testfiles/test.conf\npolicy-show\npolicy-show cat /home/testuser/lshell/test/testfiles/test.conf\n\n\033[1;91mForbidden examples\033[0m\n\033[90m------------------\033[0m\necho hello\ncat /etc/passwd\ncat /tmp/test.log\n"
messages                : {
                            'unknown_syntax': 'rpm-test: unknown syntax -> {command}',
                            'forbidden_command': 'rpm-test: command blocked -> "{command}"',
                            'forbidden_path': 'rpm-test: path blocked -> "{command}"',
                            'forbidden_character': 'rpm-test: forbidden character -> "{command}"',
                            'warning_remaining': 'rpm-test: {remaining} {violation_label} left before termination',
                            'session_terminated': 'rpm-test: session terminated (warning limit reached)',
                            'incident_reported': 'rpm-test: incident reported'
                          }

[grp:lshell]
# Group layer modifies defaults for users in UNIX group "lshell".
allowed                 : + ['whoami', 'date'] - ['cat']
path                    : + ['/var/log'] - ['/tmp']
overssh                 : + ['sftp'] - ['scp']
warning_counter         : 3
sudo_commands           : ['journalctl', 'systemctl status sshd']
env_vars                : {'LSHELL_LAYER': 'group'}

[testuser]
# User layer applies on top of default + group for testuser.
allowed                 : + ['cat', 'head', 'tail', 'policy-show'] - ['echo']
path                    : + ['/home/testuser/lshell/test/testfiles'] - ['/home']
overssh                 : + ['ls'] - ['rsync']
allowed_file_extensions : + ['.yaml'] - ['.txt']
env_vars                : {'LSHELL_LAYER': 'user-testuser', 'RPM_TEST_PROFILE': '1'}
prompt_short            : 2
