# Sample 01: baseline allow-list shell
# Commands to test:
#   - pwd                       # allowed
#   - ll                        # alias to ls -la (allowed)
#   - echo hello                # allowed
#   - uname -a                  # denied (not in allowed list)
#   - echo hi; id               # denied (forbidden character ';')
#   - policy-show               # shows effective policy

[global]
logpath  : /tmp/lshell-logs/
loglevel : 2

[default]
intro           : "Sample 01 baseline allow-list\nTry:\n- pwd\n- ll\n- echo hello\n- uname -a\n- echo hi; id\n- policy-show"
allowed         : ['ls', 'pwd', 'echo', 'cat', 'whoami', 'id', 'date', 'clear']
forbidden       : [';', '&', '|', '`', '>', '<', '$(', '${']
warning_counter : 3
aliases         : {'ll': 'ls -la'}
strict          : 0
policy_commands : 1
prompt          : "baseline:\033[91m%u\033[97m@\033[96m%h\033[0m"
