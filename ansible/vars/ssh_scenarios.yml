ssh_scenarios:
  - name: allows overssh ls
    command: "ls"
    expected_rc: 0

  - name: allows overssh pwd
    command: "pwd"
    expected_rc: 0

  - name: blocks non-overssh command
    command: "echo hello"
    expected_rc: 1
    expect_text: "forbidden char/command over SSH"

  - name: blocks separator payload
    command: "ls; id"
    expected_rc: 1
    expect_text: "forbidden char/command over SSH"

  - name: allows cat on .txt
    command: "cat readme.txt"
    expected_rc: 0
    expect_text: "hello from txt"

  - name: allows sudo ls over ssh without forbidden shell escape
    command: "sudo ls /home/ltest/readme.txt"
    expected_rc: 0
    expect_text: "/home/ltest/readme.txt"
    reject_text: "forbidden shell escape"

  - name: blocks sudo subcommand not in sudo_commands
    command: "sudo id -u"
    expected_rc: 1
    expect_text: "forbidden char/command over SSH"

  - name: returns underlying command exit code over ssh
    command: "ls missing_file_should_not_exist"
    expected_rc: 2

  - name: blocks cat on .bin
    command: "cat secret.bin"
    expected_rc: 1
    expect_text: "forbidden char/command over SSH"

  - name: blocks cat on extensionless file
    command: "cat noext"
    expected_rc: 1
    expect_text: "forbidden char/command over SSH"

  - name: allows explicitly whitelisted relative executable over ssh
    command: "./shutdown.sh"
    expected_rc: 0
    expect_text: "shutdown-script-ok"
