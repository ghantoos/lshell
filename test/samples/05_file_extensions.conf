# Sample 05: allowed file extensions
# Commands to test:
#   - touch notes.log           # allowed
#   - touch report.txt          # allowed
#   - touch app.conf            # allowed
#   - touch run.sh              # denied (.sh not allowed)
#   - cat notes.log             # allowed
#   - cat run.sh                # denied (.sh not allowed)

[global]
logpath  : /tmp/lshell-logs/
loglevel : 3

[default]
intro           : "Sample 05 file extensions\nTry:\n- touch notes.log\n- touch report.txt\n- touch app.conf\n- touch run.sh\n- cat notes.log\n- cat run.sh"
allowed                 : ['ls', 'pwd', 'cat', 'touch', 'rm', 'mv', 'cp']
allowed_file_extensions : ['.log', '.txt', '.conf']
forbidden               : [';', '&', '|', '`', '>', '<', '$(', '${']
warning_counter         : 3
strict                  : 1
policy_commands         : 1
prompt                  : "ext:\033[91m%u\033[97m@\033[96m%h\033[0m"
