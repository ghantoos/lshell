# Sample 07: SSH/scp/sftp/overssh controls
# Commands to test:
#   - policy-show               # inspect transfer-related policy keys
#   - policy-show scp -f /tmp/x # inspect command decision for scp
#   - policy-show rsync /tmp x  # inspect command decision for rsync
#   - scp -f /tmp/file          # policy allows protocol command path
#   - sftp                      # denied (sftp disabled)
#   - rsync --version           # allowed (in overssh and allowed)

[global]
logpath  : /tmp/lshell-logs/
loglevel : 4

[default]
intro           : "\033[1;95mSample 07: SSH transfer controls\033[0m\n\n\033[1;92mAllowed examples\033[0m\n\033[90m---------------\033[0m\npolicy-show\npolicy-show scp -f /tmp/x\npolicy-show rsync /tmp x\nscp -f /tmp/file\nrsync --version\n\n\033[1;91mForbidden examples\033[0m\n\033[90m------------------\033[0m\nsftp\nscp -t /tmp/file\n"
allowed         : ['ls', 'pwd', 'echo', 'scp', 'rsync']
forbidden       : [';', '&', '|', '`', '>', '<', '$(', '${']
scp             : 1
scp_upload      : 1
scp_download    : 0
scpforce        : '/tmp/uploads/'
sftp            : 0
overssh         : ['scp', 'rsync']
warning_counter : 4
strict          : 1
policy_commands : 1
prompt          : "ssh:\033[91m%u\033[97m@\033[96m%h\033[0m"
