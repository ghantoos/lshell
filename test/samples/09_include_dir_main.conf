# Sample 09: include_dir split configuration
# Commands to test:
#   - pwd                       # allowed (from [default] in this file)
#   - id                        # allowed (from include.d/20_group_testuser.conf)
#   - whoami                    # allowed (from include.d/30_user_testuser.conf)
#   - echo hello                # denied (user include removes it)
#   - ll                        # allowed (alias from include file)
#   - policy-show               # shows included files and merged policy

[global]
logpath     : /tmp/lshell-logs/
loglevel    : 3
include_dir : /app/test/samples/include.d/*.conf

[default]
intro           : "Sample 09 include_dir merge\nTry:\n- pwd\n- id\n- whoami\n- echo hello\n- ll\n- policy-show"
allowed         : ['ls', 'pwd', 'echo']
forbidden       : [';', '&', '|', '`', '>', '<', '$(', '${']
warning_counter : 3
strict          : 0
policy_commands : 1
prompt          : "include:\033[91m%u\033[97m@\033[96m%h\033[0m"
