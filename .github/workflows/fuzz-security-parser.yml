name: Fuzz Security Parser/Policy

on:
  push:
    branches: [ "master" ]
  pull_request:

permissions:
  contents: read

jobs:
  fuzz-security-parser:
    name: Fuzz Security Parser/Policy
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install just
      uses: taiki-e/install-action@just
    - name: Fuzz security parser/policy
      timeout-minutes: 45
      run: |
        just test-fuzz-security-parser 20000
